[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "RedShift"
version = "0.1.0"
description = "A package to find the redshift and the type of galaxy from any FITS file."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "astropy",  
    "numpy",
    "matplotlib",
    "scipy",
    "spectra"
]
